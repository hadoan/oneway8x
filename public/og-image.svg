<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8f9fa"/>
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <rect x="500" y="160" width="200" height="200" rx="40" fill="url(#primary)" filter="url(#glow)"/>
  <text x="600" y="280" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="80" fill="white" text-anchor="middle">OW</text>
  
  <text x="600" y="460" font-family="system-ui, -apple-system, sans-serif" font-weight="bold" font-size="64" fill="#0f172a" text-anchor="middle">Ha Doan</text>
  <text x="600" y="530" font-family="system-ui, -apple-system, sans-serif" font-weight="500" font-size="32" fill="#64748b" text-anchor="middle">Founder-Engineer • Former CTO • AI Product Builder</text>
</svg>
